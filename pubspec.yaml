name: medclock
description: "MedClock - Medication Reminder & Management App"
publish_to: 'none'
version: 1.0.0+1


environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  
  
  # HTTP & API
  dio: ^5.4.0
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  
  # Camera & Images
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # Date & Time
  intl: ^0.19.0
  
  # Charts
  fl_chart: ^0.66.0
  
  # PDF
  pdf: ^3.10.8
  printing: ^5.12.0
  
  # File & Path
  path_provider: ^2.1.2
  
  # Permissions
  permission_handler: ^11.3.0
  
  # Connectivity
  connectivity_plus: ^6.0.3

  # Maps
  google_maps_flutter: ^2.2.5
  
  # UUID
  uuid: ^4.3.3
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
